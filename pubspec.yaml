  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

