name: garbo_swms
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.0.0  # For OpenStreetMap (free)
  latlong2: ^0.9.0
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  url_launcher: ^6.3.0
  provider: ^6.0.0  # State management
  web_socket_channel: ^3.0.3  # WebSocket support
  stomp_dart_client: ^3.0.1  # STOMP over SockJS/WebSocket
  google_fonts: ^6.3.3

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  http: ^1.6.0

  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/login-hero.jpg
