name: garbo_swms
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.0.0  # For OpenStreetMap (free)
  latlong2: ^0.9.0
  image_picker: ^1.1.2
